<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PlayHub Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --play-teal: #2fb5b4; /* Your brand teal */
            --play-yellow: #ffcc00;
            --bg-light: #f9fbfb;
            --text-dark: #333;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif; /* Fallback font */
        }

        /* Responsive wrapper for the Google Form */
        .form-wrapper {
            position: relative;
            width: 100%;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .responsive-iframe {
            width: 100%;
            height: 950px; /* Adjusted for Google Form length */
            border: none;
            display: block;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(47, 181, 180, 0.1);
            border: 2px solid rgba(47, 181, 180, 0.05);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h1 {
            font-family: 'Fredoka', sans-serif;
            color: var(--play-teal);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .container {
                margin: 20px auto;
            }
            .card {
                padding: 25px 15px;
                border-radius: 20px;
            }
            .header-section h1 {
                font-size: 2rem;
            }
            .responsive-iframe {
                height: 1150px; /* Mobile forms stack fields, requiring more height */
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> 
        <a href="founder.html">Founder</a> 
        <a href="events.html">Events</a> 
        <a href="partner.html">Partner</a> 
        <a href="journey.html">Journey</a> 
        <a href="about.html">About</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="card">
            <div class="header-section">
                <h1>Contact Us</h1>
                <p>Have a question about a booking or our programs? We'd love to hear from you!</p>
            </div>
            
            <div class="form-wrapper">
                <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLSckhTFzHiN91Yd0xtD56kX4KHx1Y7VO_Oiw4BEvAcqmEKEUSg/viewform?embedded=true" 
                    class="responsive-iframe"
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0">
                    Loading…
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
