<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PlayHub Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <nav>
        <a href="index.html">Home</a> 
        <a href="founder.html">Founder</a> 
        <a href="events.html">Events</a> 
        <a href="partner.html">Partner</a> 
        <a href="journey.html">Journey</a> 
        <a href="about.html">About</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1 style="font-family: 'Fredoka'; text-align: center; color: var(--play-teal);">Contact Us</h1>
            <p style="text-align: center; margin-bottom: 30px;">Have a question about a booking or our programs? Send us a message!</p>
            
            <form 
                action="https://formspree.io/f/hello.playhubmobile@gmail.com" 
                method="POST" 
                style="display: flex; flex-direction: column; gap: 15px;"
            >
                <label style="font-weight: bold; font-size: 0.9rem;">Full Name</label>
                <input type="text" name="name" placeholder="Your Name" required style="padding: 15px; border-radius: 10px; border: 1px solid var(--line-gray);">
                
                <label style="font-weight: bold; font-size: 0.9rem;">Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required style="padding: 15px; border-radius: 10px; border: 1px solid var(--line-gray);">
                
                <label style="font-weight: bold; font-size: 0.9rem;">How can we help?</label>
                <textarea name="message" placeholder="Tell us about your event..." rows="5" required style="padding: 15px; border-radius: 10px; border: 1px solid var(--line-gray); font-family: inherit;"></textarea>
                
                <button type="submit" class="btn btn-teal">SEND MESSAGE</button>
            </form>
        </div>
    </div>
</body>
</html>
