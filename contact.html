<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PlayHub Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --play-teal: #2fb5b4;
            --play-yellow: #ffcc00;
            --soft-gray: #f8fafa;
            --line-gray: #e0e7e7;
            --text-dark: #333;
        }

        body {
            background-color: var(--soft-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .contact-section {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 35px; /* Extra rounded for the brand style */
            box-shadow: 0 10px 40px rgba(47, 181, 180, 0.12);
        }

        .contact-intro {
            text-align: center;
            margin-bottom: 35px;
        }

        .contact-title {
            font-family: 'Fredoka', sans-serif;
            color: var(--play-teal);
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .contact-description {
            font-size: 1.1rem;
            color: #666;
            margin: 0 auto;
            max-width: 500px;
            line-height: 1.5;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-left: 5px;
        }

        .form-input, .form-textarea {
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--line-gray);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--play-teal);
            background: #f0fdfd;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-submit {
            background-color: var(--play-teal);
            color: white;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-submit:hover {
            background-color: #269a99;
            transform: translateY(-2px);
        }

        /* Mobile Layout */
        @media (max-width: 600px) {
            .contact-section {
                margin: 20px 15px;
                padding: 30px 20px;
                border-radius: 25px;
            }
            .contact-title {
                font-size: 2rem;
            }
            .form-submit {
                font-size: 1.1rem;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a> 
        <a href="founder.html">Founder</a> 
        <a href="events.html">Events</a> 
        <a href="partner.html">Partner</a> 
        <a href="journey.html">Journey</a> 
        <a href="about.html">About</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <section class="contact-section">
        <div class="contact-intro">
            <h2 class="contact-title">Get in Touch</h2>
            <p class="contact-description">
                Fill out the form below and we'll get back to you as soon as possible.
            </p>
        </div>

        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE" />
            <input type="hidden" name="subject" value="New Contact Form Submission from PlayHub Mobile" />
            <input type="hidden" name="from_name" value="PlayHub Mobile Website" />

            <div class="form-group-container">
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input id="name" name="name" class="form-input" placeholder="Your name" type="text" required />
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" class="form-input" placeholder="Your email" type="email" required />
                </div>
                
                <div class="form-group">
                    <label for="phone" class="form-label">Phone</label>
                    <input id="phone" name="phone" class="form-input" placeholder="+1 (234) 567-8900" type="text" required />
                </div>
                
                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-textarea" id="message" name="message" placeholder="Tell us about your event..." required></textarea>
                </div>
            </div>

            <button class="form-submit" type="submit">Send Message</button>
        </form>
    </section>

</body>
</html>
