<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | PlayHub Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Responsive wrapper for the Google Form */
        .form-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            /* Adjust padding-top to control aspect ratio if needed, 
               but a fixed height works best for long forms */
        }
        
        .responsive-iframe {
            width: 100%;
            height: 900px; /* Adjust this based on your Google Form length */
            border: none;
            border-radius: 15px;
        }

        /* Ensuring the card container looks great on all screens */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .card {
                padding: 15px;
            }
            .responsive-iframe {
                height: 1100px; /* Mobile forms often need more height as fields stack */
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> 
        <a href="founder.html">Founder</a> 
        <a href="events.html">Events</a> 
        <a href="partner.html">Partner</a> 
        <a href="journey.html">Journey</a> 
        <a href="about.html">About</a> 
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1 style="font-family: 'Fredoka'; text-align: center; color: var(--play-teal); margin-top: 0;">Contact Us</h1>
            <p style="text-align: center; margin-bottom: 20px;">Have a question about a booking or our programs? Fill out the form below!</p>
            
            <div class="form-wrapper">
<form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="d4ff78d0-82a7-438f-9371-e7b0e20e4b99">
  Name<input type="text" name="name" required> <br />
  Email<input type="email" name="email" required><br />
  How can we help? <textarea name="message" required></textarea>
  <button type="submit">Submit</button>
</form>
            </div>
        </div>
    </div>
</body>
</html>
